name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      aws-assume-role-arn: 'arn:aws:iam::790856971473:role/github-actions-joaovictorbezerra'
      aws-lock-dynamo-db-table: 'joaovictorbezerra-sa-east-2-terraform-lock'
      aws-region: 'sa-east-2'
      aws-statefile-s3-bucket: 'joaovictor-sa-east-2-terraform-statefile'
      environment: 'dev'