name: "Terraform Workflow"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      aws-region:
        type: string
        required: true
      aws-assume-role-arn:
        type: string
        required: true
      aws-statefile-s3-bucket:
        type: string
        required: true
      aws-lock-dynamo-db-table:
        type: string
        required: true
jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-assume-role-arn }}
          role-session-name: ${{ inputs.environment }}-github-actions-session
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform Init
        run: |
          cd infra && terraform init \
          -backend-config="bucket=${{ inputs.aws-statefile-s3-bucket }}" \
          -backend-config="key=${{ github.event.repository.name }}/terraform.tfstate" \
          -backend-config="region=${{ inputs.aws-region }}" \
          -backend-config="dynamodb_table=${{ inputs.aws-lock-dynamo-db-table }}"
#
#      - name: Terraform Validate
#        run: cd infra && terraform validate
#
#      - name: Terraform Plan
#        id: terraform_plan
#        run:
#          cd infra && terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }} &&
#          terraform plan -var-file="./env/${{ inputs.environment }}/terraform.tfvars" -out="${{ inputs.environment }}.plan"
#
#      - name: Terraform Apply
#        id: terraform_apply
#        run:
#          cd infra && terraform workspace select ${{ inputs.environment }} &&
#          terraform apply "${{ inputs.environment }}.plan"

      - name: Terraform Destroy
        id: terraform_destroy
        run:
          cd infra && terraform destroy --auto-approve